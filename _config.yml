# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole blog, values
# which you are expected to set up once and rarely need to edit after that.
# For technical reasons, this file is *NOT* reloaded automatically when you use
# 'jekyll serve'. If you change this file, please restart the server process.

# Site language
lang: en-US

# Site title
title: "Fernando Herrero Carrón"

# A description of your site for meta tag, search engine results.
description: "A personal blog about software engineering, psychology and photography"

# The subpath of your site, e.g. /blog, for generating urls.
baseurl: ""

# The base hostname & protocol of your site for where absolute urls are needed.
url: "https://www.fhcarron.com"

# Favicon
favicon: images/favicon.png

# Google Analytics id, e.g. "UA-NNNNNNNN-N"
# google_analytics: ""

# Site navigation - each item must have a title and a url.
navigation:
  - text: Inicio
    url: /
  - text: Acerca de
    url: /acercade
  - text: Etiquetas
    url: /etiquetas

# The shortname for your Disqus site to enable comments.
# disqus: elferdo

# Localization
date_locale: es
locales_path: _locales

# Colors
accent_color: '#2d72d9'

# Site footer
footer:
  content: "&copy; 2025-2026 Fernando Herrero Carrón todos los derechos reservados. Tema derivado de Scriptor por [JustGoodThemes](https://www.justgoodthemes.com)."
  has_social: true

# Plugins
plugins:
  - jekyll-paginate

# http://jekyllrb.com/docs/pagination/
paginate: 3
paginate_path: '/page:num/'


# Permalinks
permalink: /:title

# Conversion
markdown: kramdown

# Sass
sass:
  sass_dir: _sass
  style: compressed

